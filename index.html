<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="개발자를 위한 프로그래밍 대회 일정 모음" />
  <title>Contest Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── 헤더 ── -->
  <header class="header">
    <div class="container header__inner">
      <div class="header__brand">
        <span class="header__logo">
          <span class="logo-bracket">[</span>
          <span class="logo-text">contest</span>
          <span class="logo-accent">tracker</span>
          <span class="logo-bracket">]</span>
        </span>
        <p class="header__tagline">프로그래밍 대회 일정 자동 수집기</p>
      </div>
      <div class="header__meta">
        <span class="badge badge--live">
          <span class="badge__dot"></span>
          AUTO-UPDATED
        </span>
        <p class="header__updated">마지막 갱신: <span id="updatedAt">—</span></p>
      </div>
    </div>
  </header>

  <!-- ── 메인 ── -->
  <main class="main">
    <div class="container">

      <!-- 통계 카드 -->
      <section class="stats" aria-label="통계">
        <div class="stat-card">
          <p class="stat-card__label">총 대회 수</p>
          <p class="stat-card__value" id="totalCount">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">마감 임박</p>
          <p class="stat-card__value" id="weekCount">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">수집 소스</p>
          <p class="stat-card__value" id="sourceCount">—</p>
        </div>
      </section>

      <!-- 필터 / 검색 -->
      <section class="toolbar" aria-label="필터">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="8.5" cy="8.5" r="5.75" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <input
            class="search-input"
            id="searchInput"
            type="text"
            placeholder="대회 이름 검색…"
            aria-label="대회 이름 검색"
          />
        </div>
        <div class="filter-wrap" id="filterWrap" role="group" aria-label="소스 필터">
          <button class="filter-btn filter-btn--active" data-filter="all">All</button>
          <!-- JS가 소스별 버튼 동적 생성 -->
        </div>
      </section>

      <!-- 대회 목록 -->
      <section aria-label="대회 목록">
        <div class="grid" id="contestGrid">
          <!-- JS가 카드 렌더링 -->
        </div>
        <p class="empty-msg" id="emptyMsg" hidden>
          검색 결과가 없습니다. 다른 키워드를 입력해보세요.
        </p>
      </section>

    </div>
  </main>

  <!-- ── 푸터 ── -->
  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__left">
        Built with
        <a href="https://playwright.dev" target="_blank" rel="noopener">Playwright</a>
        &amp; GitHub Actions
      </p>
      <p class="footer__right">
        <a href="contests.json" target="_blank" rel="noopener">contests.json</a>
        &nbsp;·&nbsp;
        <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
      </p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
